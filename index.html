<!DOCTYPE html>
<html>
<head>
    <title>Mohamed Sharafudheen P S</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1f2937, #020617);
            color: white;
        }

        .container {
            max-width: 380px;
            margin: 40px auto;
            padding: 25px 15px 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* PROFILE IMAGE */
        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fbbf24;
            box-shadow: 0 0 25px rgba(251,191,36,0.4);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* TEXT */
        h2 {
            margin: 10px 0 5px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #fbbf24;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .company {
            color: #60a5fa;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* CONTACT ITEMS */
        .contact {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 12px 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            transition: 0.3s;
        }

        .contact:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-2px);
        }

        .icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #fbbf24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .text {
            text-align: left;
        }

        .text a {
            color: #e5e7eb;
            text-decoration: none;
            font-size: 15px;
        }

        /* BUTTON */
        .btn {
            margin: 25px auto 10px;
            display: block;
            width: 85%;
            padding: 14px;
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(251,191,36,0.4);
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        /* WHATSAPP FLOAT */
        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            text-decoration: none;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 400px) {
            .container {
                margin: 20px 10px;
            }
        }

    </style>
</head>

<body>

<div class="container">

</html>
