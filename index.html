<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:#fff;
}

.container{
    width:100%;
    max-width:420px;
}

.profile-card{
    position:relative;
    overflow:hidden;
    border-radius:30px;
    padding:30px 20px;
    min-height:90vh;

    background:
    linear-gradient(
        135deg,
        #050505,
        #111111,
        #1a1a1a
    );

    box-shadow:
    0 20px 60px rgba(0,0,0,.6);
}

/* Glass Shapes */

.profile-card::before{
    content:"";
    position:absolute;
    top:-100px;
    right:-120px;
    width:280px;
    height:280px;

    background:rgba(255,255,255,.05);

    transform:rotate(45deg);
    border-radius:40px;
}

.profile-card::after{
    content:"";
    position:absolute;
    bottom:-120px;
    left:-120px;
    width:250px;
    height:250px;

    background:rgba(255,255,255,.04);

    transform:rotate(45deg);
    border-radius:40px;
}

/* Logo */

.logo{
    width:100px;
    display:block;
    margin:0 auto 20px;
    position:relative;
    z-index:2;
}

/* Profile */

.avatar{
    width:130px;
    height:130px;
    margin:auto;

    border-radius:50%;
    overflow:hidden;

    border:4px solid rgba(255,193,7,.5);

    position:relative;
    z-index:2;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h2{
    text-align:center;
    margin-top:18px;
    font-size:28px;
    font-weight:700;
    position:relative;
    z-index:2;
}

.subtitle{
    text-align:center;
    color:#ffc107;
    font-size:18px;
    font-weight:600;
    margin-top:10px;
    position:relative;
    z-index:2;
}

.divider{
    width:140px;
    height:3px;
    background:#ffc107;
    margin:15px auto;
    border-radius:5px;
}

.company{
    text-align:center;
    color:#ffffff;
    opacity:.8;
    font-size:14px;
    letter-spacing:1px;
    margin-bottom:25px;
    position:relative;
    z-index:2;
}

/* Contact */

.contact{
    margin-bottom:15px;
    position:relative;
    z-index:2;
}

.contact label{
    display:block;
    margin-bottom:8px;
    color:#ffc107;
    font-size:13px;
    font-weight:500;
}

.field{
    background:rgba(255,255,255,.08);
    border-radius:15px;
    padding:15px;

    display:flex;
    align-items:center;
    gap:12px;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.05);
}

.field i{
    color:#ffc107;
    width:20px;
    font-size:18px;
}

.field a{
    color:white;
    text-decoration:none;
    font-size:14px;
    word-break:break-word;
}

.field span{
    font-size:14px;
    color:white;
}

/* Button */

.btn{
    display:block;
    text-align:center;

    margin-top:25px;

    background:
    linear-gradient(
        90deg,
        #ffc107,
        #ff9800
    );

    color:#111;
    padding:16px;

    border-radius:15px;

    text-decoration:none;
    font-weight:700;

    box-shadow:
    0 10px 25px rgba(255,193,7,.25);

    position:relative;
    z-index:2;
}

/* WhatsApp */

.whatsapp{
    position:fixed;

    right:20px;
    bottom:20px;

    width:65px;
    height:65px;

    border-radius:50%;

    background:#25D366;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    text-decoration:none;

    font-size:30px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.4);

    z-index:999;
}

@media(max-width:420px){

    .profile-card{
        min-height:auto;
    }

    h2{
        font-size:24px;
    }

}

</style>
